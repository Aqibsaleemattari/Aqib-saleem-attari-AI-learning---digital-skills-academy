<script>
/* ============================================================
   NEW FEATURES JAVASCRIPT - تمام Functions "nf-" prefix استعمال کرتے ہیں
   ============================================================ */

// ===== STATE VARIABLES =====
let nfIsRollSlipOpen = true;
let nfStatusCheckInterval = null;

// ===== CNIC VALIDATION =====
function nfValidateCNIC(cnic) {
    return /^\d{5}-\d{7}-\d$/.test(cnic);
}

// ===== ROLL NUMBER SLIP PORTAL =====
window.nfCheckRollSlip = async function() {
    try {
        if (!nfIsRollSlipOpen) {
            nfShowToast('⚠️ رول نمبر پورٹل فی الحال بند ہے۔', 'warning');
            return;
        }
        
        const cnic = document.getElementById('nf-rollSlipCNIC').value.trim();
        
        if (!cnic) {
            nfShowToast('⚠️ براہ کرم شناختی کارڈ نمبر درج کریں!', 'warning');
            return;
        }
        
        if (!nfValidateCNIC(cnic)) {
            nfShowToast('⚠️ براہِ کرم درست شناختی کارڈ نمبر درج کریں۔ (مثال: 12345-1234567-1)', 'warning');
            const box = document.getElementById('nf-rollSlipDisplayBox');
            box.style.display = 'block';
            box.innerHTML = `
                <div class="nf-status-box">
                    <span class="nf-icon">❌</span>

            `;
            return;
        }
        
        nfShowLoading();
        const box = document.getElementById('nf-rollSlipDisplayBox');
        box.style.display = 'block';
        
        // Firebase Query
        if (typeof db !== 'undefined' && db && typeof collection !== 'undefined' && typeof query !== 'undefined' && typeof where !== 'undefined' && typeof getDocs !== 'undefined') {
            try {
                const registrationsRef = collection(db, 'registrations');
                const q = query(registrationsRef, where('cnic', '==', cnic));
                const regSnap = await getDocs(q);
                
                if (regSnap.empty) {
                    nfHideLoading();
                    box.innerHTML = `
                        <div class="nf-status-box">
                            <span class="nf-icon">📭</span>
                            <h4 style="color: #f87171;">یہ شناختی کارڈ نمبر رجسٹرڈ نہیں ہے</h4>

                        </div>
                    `;
                    nfShowToast('❌ یہ شناختی کارڈ نمبر رجسٹرڈ نہیں ہے۔', 'error');
                    return;
                }
                
                let latestReg = null;
                let latestDate = null;
                
                regSnap.forEach(doc => {
                    const data = doc.data();
                    if (data.cnic === cnic) {
                        const regDate = data.registrationDate || '';
                        if (!latestDate || regDate > latestDate) {
                            latestDate = regDate;
                            latestReg = { id: doc.id, ...data };
                        }
                    }
                });
                
                if (!latestReg) {
                    nfHideLoading();
                    box.innerHTML = `
                        <div class="nf-status-box">
                            <span class="nf-icon">❌</span>
                            <h4 style="color: #f87171;">یہ شناختی کارڈ نمبر رجسٹرڈ نہیں ہے</h4>
                            <p style="color:#94a3b8;">This CNIC number is not registered.</p>
                        </div>
                    `;
                    nfShowToast('❌ یہ شناختی کارڈ نمبر رجسٹرڈ نہیں ہے۔', 'error');
                    return;
                }
                
                // Check Payment Status
                if (latestReg.paymentStatus !== 'Verified') {
                    nfHideLoading();
                    box.innerHTML = `
                        <div class="nf-status-box">
                            <span class="nf-icon">⏳</span>
                            <h4 style="color: #fbbf24;">فیس زیرِ التواء</h4>
                            <p>آپ کی فیس ابھی تصدیق کے مرحلے میں ہے۔ فیس کی تصدیق کے بعد آپ کا رول نمبر جاری کیا جائے گا۔</p>
                        </div>
                    `;
                    nfShowToast('⏳ فیس زیرِ التواء ہے۔', 'warning');
                    return;
                }
                
                // Check Registration Status
                if (latestReg.status === 'Pending') {
                    nfHideLoading();
                    box.innerHTML = `
                        <div class="nf-status-box">
                            <span class="nf-icon">⏳</span>
                            <h4 style="color: #fbbf24;">رجسٹریشن زیرِ تصدیق ہے</h4>
                            <p>رول نمبر جاری ہونے کے بعد یہاں ظاہر ہوگا۔</p>
                        </div>
                    `;
                    nfShowToast('⏳ رجسٹریشن زیرِ تصدیق ہے۔', 'info');
                    return;
                }
                
                // Approved - Show Slip
                if (latestReg.status === 'Approved' && latestReg.rollNumber) {
                    const phoneNumber = '03181534883';
                    box.innerHTML = `
                        <div id="nf-rollSlipCard">
                            <div class="nf-glow"></div>
                            <div class="nf-academy">عاقب سلیم عطاری<br>اے آئی لرننگ اینڈ ڈیجیٹل سکلز اکیڈمی</div>
                            <p class="nf-instructor">| انجینئر عاقب سلیم عطاری | وائس پرنسپل و ایڈمنسٹریٹر</p>
                            <hr class="nf-divider">
                            <h4 class="nf-card-title">🎫 رول نمبر سلپ</h4>
                            <div class="nf-details">
                                <p><span class="nf-label">بیچ نمبر:</span> <span class="nf-value">${latestReg.batchNumber || 'N/A'}</span></p>
                                <p><span class="nf-label">طالب علم کا نام:</span> <span class="nf-value">${latestReg.studentName || 'N/A'}</span></p>
                                <p><span class="nf-label">والد کا نام:</span> <span class="nf-value">${latestReg.fatherName || 'N/A'}</span></p>
                                <p><span class="nf-label">شناختی کارڈ نمبر:</span> <span class="nf-value">${latestReg.cnic}</span></p>
                                <p><span class="nf-label">فون نمبر:</span> <span class="nf-value">${phoneNumber}</span></p>
                                <p><span class="nf-label">رول نمبر:</span> <span class="nf-roll-number">${latestReg.rollNumber}</span></p>
                                <p><span class="nf-label">رجسٹریشن کی تاریخ:</span> <span class="nf-value">${new Date(latestReg.registrationDate).toLocaleDateString('ur-PK')}</span></p>
                            </div>
                            <hr class="nf-divider">
                            <p class="nf-footer">یہ سلپ آپ کی رجسٹریشن کی تصدیق ہے۔<br>براہ کرم امتحان کے وقت یہ سلپ ساتھ رکھیں۔<br>مزید معلومات کے لیے رابطہ کریں: 03181534883</p>
                        </div>
                        <div class="nf-btn-group" style="margin-top:20px;">
                            <button class="nf-btn-save" onclick="nfSaveRollSlip()">💾 سلپ بطور تصویر سیو کریں</button>
                        </div>
                    `;
                    nfHideLoading();
                    nfShowToast('✅ رول نمبر سلپ لوڈ ہو گئی!', 'success');
                    return;
                }
                
                nfHideLoading();
                box.innerHTML = `
                    <div class="nf-status-box">
                        <span class="nf-icon">❌</span>
                        <h4 style="color: #f87171;">خرابی</h4>
                        <p>رجسٹریشن کی حیثیت معلوم نہیں ہو سکی۔ براہ کرم ایڈمن سے رابطہ کریں۔</p>
                    </div>
                `;
                nfShowToast('❌ رجسٹریشن کی حیثیت معلوم نہیں ہو سکی۔', 'error');
                
            } catch (firebaseError) {
                nfHideLoading();
                console.error('Firebase Error:', firebaseError);
                box.innerHTML = `
                    <div class="nf-status-box">
                        <span class="nf-icon">⚠️</span>
                        <h4 style="color: #fbbf24;">سروس دستیاب نہیں</h4>
                        <p>براہ کرم بعد میں دوبارہ کوشش کریں۔</p>
                        <p style="color:#94a3b8; font-size:12px;">${firebaseError.message}</p>
                    </div>
                `;
                nfShowToast('⚠️ سروس دستیاب نہیں۔', 'error');
            }
        } else {
            nfHideLoading();
            box.innerHTML = `
                <div class="nf-status-box">
                    <span class="nf-icon">⚠️</span>
                    <h4 style="color: #fbbf24;">سروس دستیاب نہیں</h4>
                    <p>براہ کرم بعد میں دوبارہ کوشش کریں۔</p>
                </div>
            `;
            nfShowToast('⚠️ سروس دستیاب نہیں۔', 'error');
        }
        
    } catch (error) {
        nfHideLoading();
        nfShowToast('❌ سلپ چیک کرنے میں خرابی: ' + error.message, 'error');

// ===== ROLL SLIP PORTAL CONTROL =====
window.nfSetPortalStatus = async function(portal, open) {
    try {
        if (typeof auth === 'undefined' || !auth.currentUser) {
            nfShowToast('⚠️ براہ کرم پہلے ایڈمن لاگ ان کریں!', 'warning');
            return;
        }
        
        nfShowLoading();
        
        if (typeof db !== 'undefined' && db && typeof doc !== 'undefined' && typeof setDoc !== 'undefined' && typeof getDoc !== 'undefined') {
            try {
                const docRef = doc(db, 'settings', 'portal_controls');
                const docSnap = await getDoc(docRef);
                let data = docSnap.exists() ? docSnap.data() : {};
                
                if (portal === 'rollSlip') {
                    data.rollSlipOpen = open;
                    nfIsRollSlipOpen = open;
                }
                
                await setDoc(docRef, data);
                nfHideLoading();
                nfShowToast(open ? '✅ رول سلپ پورٹل کھول دیا گیا!' : '🛑 رول سلپ پورٹل بند کر دیا گیا!', open ? 'success' : 'warning');
                nfUpdatePortalUI();
            } catch (firebaseError) {
                nfHideLoading();
                console.error('Firebase Error:', firebaseError);
                nfShowToast('❌ پورٹل تبدیل کرنے میں خرابی: ' + firebaseError.message, 'error');
            }
        } else {
            nfHideLoading();
            nfShowToast('⚠️ سروس دستیاب نہیں۔', 'error');
        }
    } catch (error) {
        nfHideLoading();
        nfShowToast('❌ پورٹل تبدیل کرنے میں خرابی: ' + error.message, 'error');
        console.error('Set Portal Status Error:', error);
    }
};

    }
}

// ===== COPY LINK =====
window.nfCopyLink = function(sectionId) {
    const url = window.location.href.split('#')[0] + '#' + sectionId;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => {
            nfShowToast('✅ لنک کاپی ہو گیا! شیئر کریں۔', 'success');
        }).catch(() => {
            nfFallbackCopyLink(url);
        });
    } else {
        nfFallbackCopyLink(url);
    }
};

function nfFallbackCopyLink(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        nfShowToast('✅ لنک کاپی ہو گیا! شیئر کریں۔', 'success');
    } catch (err) {
        nfShowToast('❌ لنک کاپی نہیں ہو سکا', 'error');
    }
    document.body.removeChild(textarea);
}

// ===== SCROLL TO SECTION =====
window.nfScrollTo = function(id) {
    const element = document.getElementById(id);
    if (element) {
        const offset = 80;
        const elementPosition = element.getBoundingClientRect().top + window.pageYOffset;
        window.scrollTo({ top: elementPosition - offset, behavior: 'smooth' });
        nfShowToast('📌 ' + id + ' سیکشن پر پہنچ گئے', 'info');
    } else {
        nfShowToast('⚠️ سیکشن نہیں ملا', 'error');
    }
};

// ===== COPY STAT =====
window.nfCopyStat = function(type) {
    const statData = {
        visitors: { label: 'زائرین', element: 'visitorCountDisplay' },
        students: { label: 'رجسٹرڈ طلباء', element: 'studentCountDisplay' },
        projects: { label: 'کامیاب پروجیکٹس', element: 'projectCountDisplay' },
        reviews: { label: 'تصدیق شدہ ریویوز', element: 'reviewCountDisplay' }
    };
    
    const stat = statData[type];
    if (!stat) return;
    
    const el = document.getElementById(stat.element);
    const value = el ? el.textContent : '0';
    const text = stat.label + ': ' + value;
    
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            nfShowCopyFeedback(type);
        }).catch(() => {
            nfFallbackCopy(text, type);
        });
    } else {
        nfFallbackCopy(text, type);
    }
};

function nfFallbackCopy(text, type) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        nfShowCopyFeedback(type);
    } catch (err) {
        nfShowToast('❌ کاپی نہیں ہو سکا', 'error');
    }
    document.body.removeChild(textarea);
}

function nfShowCopyFeedback(type) {
    const btn = document.getElementById('nf-copy-' + type);
    if (btn) {
        btn.classList.add('nf-copied');
        btn.textContent = '✅';
        setTimeout(() => {
            btn.classList.remove('nf-copied');
            btn.textContent = '📋';
        }, 2000);
    }
    const labels = {
        visitors: 'زائرین',
        students: 'رجسٹرڈ طلباء',
        projects: 'کامیاب پروجیکٹس',
        reviews: 'تصدیق شدہ ریویوز'
    };
    nfShowToast('✅ ' + labels[type] + ' کاپی ہو گیا!', 'success');
}

// ===== TOAST NOTIFICATIONS =====
function nfShowToast(message, type) {
    type = type || 'info';
    let container = document.getElementById('nf-toastContainer');
    
    if (!container) {
        container = document.createElement('div');
        container.id = 'nf-toastContainer';
        container.style.cssText = `
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
            width: 100%;
        `;
        document.body.appendChild(container);
    }
    
    const toast = document.createElement('div');
    const colors = {
        success: '#34d399',
        error: '#f87171',
        warning: '#fbbf24',
        info: '#60a5fa'
    };
    const icons = {
        success: '✅',
        error: '❌',
        warning: '⚠️',
        info: 'ℹ️'
    };
    
    toast.style.cssText = `
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px 18px;
        color: #e0e0e0;
        font-size: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 12px;
        border-right: 4px solid ${colors[type] || '#60a5fa'};
        animation: nfSlideInRight 0.3s ease forwards;
    `;
    
    toast.innerHTML = `
        <span style="font-size: 20px;">${icons[type] || 'ℹ️'}</span>
        <span>${message}</span>
        <span onclick="this.parentElement.remove()" style="cursor: pointer; opacity: 0.5; transition: 0.3s; margin-right: auto; font-size: 18px;">✕</span>
    `;
    
    container.appendChild(toast);
    
    setTimeout(() => {
        if (toast.parentElement) {
            toast.style.animation = 'nfSlideOutRight 0.3s ease forwards';
            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, 300);
        }
    }, 3000);
}
